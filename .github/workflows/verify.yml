name: Verify

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  fast-pr-lane:
    if: github.event_name != 'schedule'
    name: Fast PR Lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          repository: hxrts/toolkit
          ref: v0.2.0
          path: .toolkit
      - name: Link toolkit sibling checkout
        run: ln -sfn "$GITHUB_WORKSPACE/.toolkit" "$GITHUB_WORKSPACE/../toolkit"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify Lean installation
        run: |
          lake --version
          lean --version

      - name: Provision pinned Lean dependencies
        run: |
          sudo mkdir -p /Users/hxrts/projects
          sudo chown -R "$USER":"$USER" /Users/hxrts
          ./scripts/bootstrap/dependency-checkouts.sh

      - name: Install just
        run: cargo install just --locked

      - name: Run PR-critical assurance lane
        run: |
          mkdir -p artifacts
          just check-pr-critical | tee artifacts/check-pr-critical.log

      - name: Run parity gate
        run: |
          mkdir -p artifacts
          just check-parity | tee artifacts/check-parity.log

      - name: Upload fast-lane artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fast-pr-lane-artifacts
          path: artifacts/
          if-no-files-found: warn

  scheduled-heavy-lane:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Scheduled Heavy Lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          repository: hxrts/toolkit
          ref: v0.2.0
          path: .toolkit
      - name: Link toolkit sibling checkout
        run: ln -sfn "$GITHUB_WORKSPACE/.toolkit" "$GITHUB_WORKSPACE/../toolkit"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify Lean installation
        run: |
          lake --version
          lean --version

      - name: Provision pinned Lean dependencies
        run: |
          sudo mkdir -p /Users/hxrts/projects
          sudo chown -R "$USER":"$USER" /Users/hxrts
          ./scripts/bootstrap/dependency-checkouts.sh

      - name: Install just
        run: cargo install just --locked

      - name: Run PR-critical assurance lane
        run: |
          mkdir -p artifacts
          just check-pr-critical | tee artifacts/check-pr-critical.log

      - name: Run parity gate
        run: |
          mkdir -p artifacts
          just check-parity | tee artifacts/check-parity.log

      - name: Run scheduled deep-assurance lane
        run: |
          mkdir -p artifacts
          just check-deep-assurance | tee artifacts/check-deep-assurance.log

      - name: Upload heavy-lane artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-heavy-lane-artifacts
          path: artifacts/
          if-no-files-found: warn
