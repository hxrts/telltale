name: Verify

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  fast-pr-lane:
    if: github.event_name != 'schedule'
    name: Fast PR Lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify Lean installation
        run: |
          lake --version
          lean --version

      - name: Provision pinned Lean dependencies
        run: |
          sudo mkdir -p /Users/hxrts/projects
          sudo chown -R "$USER":"$USER" /Users/hxrts
          ./scripts/bootstrap/dependency-checkouts.sh

      - name: Install just
        run: cargo install just --locked

      - name: Check workflow action references
        run: |
          mkdir -p artifacts
          just check-workflow-actions | tee artifacts/check-workflow-actions.log

      - name: Check verification inventory freshness
        run: |
          mkdir -p artifacts
          just check-verification-inventory | tee artifacts/check-verification-inventory.log

      - name: Validate source doc DSL snippets
        run: |
          mkdir -p artifacts
          just check-source-doc-snippets | tee artifacts/check-source-doc-snippets.log

      - name: Check Lean metrics freshness
        run: |
          mkdir -p artifacts
          just check-lean-metrics | tee artifacts/check-lean-metrics.log

      - name: Run tooling convergence checks
        run: |
          mkdir -p artifacts
          just check-tooling-convergence | tee artifacts/check-tooling-convergence.log

      - name: Check Lean prebuilt artifacts
        run: |
          mkdir -p artifacts
          just check-lean-prebuilt | tee artifacts/check-lean-prebuilt.log

      - name: Audit bridge normalization ledger
        run: |
          mkdir -p artifacts
          just check-bridge-normalization | tee artifacts/check-bridge-normalization.log

      - name: Check packaged crate artifacts
        run: |
          mkdir -p artifacts
          just check-package-artifacts | tee artifacts/check-package-artifacts.log

      - name: Run strict Lean bridge verification lane
        run: |
          mkdir -p artifacts
          just check-lean-bridge-strict | tee artifacts/check-lean-bridge-strict.log

      - name: Run compiler pipeline suites
        run: |
          mkdir -p artifacts
          just check-compiler-pipeline | tee artifacts/check-compiler-pipeline.log

      - name: Run deadlock automation suites
        run: |
          mkdir -p artifacts
          just check-deadlock-automation | tee artifacts/check-deadlock-automation.log

      - name: Run authority metatheory suites
        run: |
          mkdir -p artifacts
          just check-authority-metatheory | tee artifacts/check-authority-metatheory.log

      - name: Run concrete refinement suites
        run: |
          mkdir -p artifacts
          just check-concrete-refinement | tee artifacts/check-concrete-refinement.log

      - name: Run transported theorem boundary suites
        run: |
          mkdir -p artifacts
          just check-transported-theorem-boundary | tee artifacts/check-transported-theorem-boundary.log

      - name: Run handler contract suites
        run: |
          mkdir -p artifacts
          just check-handler-contracts | tee artifacts/check-handler-contracts.log

      - name: Run extension dispatch suites
        run: |
          mkdir -p artifacts
          just check-extension-dispatch | tee artifacts/check-extension-dispatch.log

      - name: Run semantic assurance suites
        run: |
          mkdir -p artifacts
          just check-semantic-assurance | tee artifacts/check-semantic-assurance.log

      - name: Run runtime boundary suites
        run: |
          mkdir -p artifacts
          just check-runtime-boundaries | tee artifacts/check-runtime-boundaries.log

      - name: Run Lean architecture/style checks
        run: |
          mkdir -p artifacts
          just check-arch-lean | tee artifacts/check-arch-lean.log

      - name: Run executable protocol machine placeholder baseline checks
        run: |
          mkdir -p artifacts
          just check-protocol-machine-placeholders | tee artifacts/check-protocol-machine-placeholders.log

      - name: Run parity checks
        run: |
          mkdir -p artifacts
          just check-parity | tee artifacts/check-parity.log

      - name: Run ownership contract checks
        run: |
          mkdir -p artifacts
          just check-ownership-contracts | tee artifacts/check-ownership-contracts.log

      - name: Run Aura-derived boundary checks
        run: |
          mkdir -p artifacts
          just check-aura-borrowed-lints | tee artifacts/check-aura-borrowed-lints.log

      - name: Run docs link checks
        run: |
          mkdir -p artifacts
          ./scripts/check/docs-links.sh | tee artifacts/check-docs-links.log

      - name: Run capability gate checks
        run: |
          mkdir -p artifacts
          just check-capability-gates | tee artifacts/check-capability-gates.log

      - name: Run release conformance checks
        run: |
          mkdir -p artifacts
          just check-release-conformance | tee artifacts/check-release-conformance.log

      - name: Build targeted Lean protocol machine modules
        run: just verify-lean-protocol-machine-targets

      - name: Run protocol verification lane
        run: |
          mkdir -p artifacts
          just verify-protocols | tee artifacts/verify-protocols.log

      - name: Run Track A gate
        run: |
          mkdir -p artifacts
          just verify-track-a | tee artifacts/verify-track-a.log

      - name: Upload fast-lane artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fast-pr-lane-artifacts
          path: artifacts/
          if-no-files-found: warn

  scheduled-heavy-lane:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Scheduled Heavy Lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify Lean installation
        run: |
          lake --version
          lean --version

      - name: Provision pinned Lean dependencies
        run: |
          sudo mkdir -p /Users/hxrts/projects
          sudo chown -R "$USER":"$USER" /Users/hxrts
          ./scripts/bootstrap/dependency-checkouts.sh

      - name: Install just
        run: cargo install just --locked

      - name: Check workflow action references
        run: |
          mkdir -p artifacts
          just check-workflow-actions | tee artifacts/check-workflow-actions.log

      - name: Check verification inventory freshness
        run: |
          mkdir -p artifacts
          just check-verification-inventory | tee artifacts/check-verification-inventory.log

      - name: Validate source doc DSL snippets
        run: |
          mkdir -p artifacts
          just check-source-doc-snippets | tee artifacts/check-source-doc-snippets.log

      - name: Check Lean metrics freshness
        run: |
          mkdir -p artifacts
          just check-lean-metrics | tee artifacts/check-lean-metrics.log

      - name: Run tooling convergence checks
        run: |
          mkdir -p artifacts
          just check-tooling-convergence | tee artifacts/check-tooling-convergence.log

      - name: Check Lean prebuilt artifacts
        run: |
          mkdir -p artifacts
          just check-lean-prebuilt | tee artifacts/check-lean-prebuilt.log

      - name: Run strict Lean bridge verification lane
        run: |
          mkdir -p artifacts
          just check-lean-bridge-strict | tee artifacts/check-lean-bridge-strict.log

      - name: Run authority metatheory suites
        run: |
          mkdir -p artifacts
          just check-authority-metatheory | tee artifacts/check-authority-metatheory.log

      - name: Run transported theorem boundary suites
        run: |
          mkdir -p artifacts
          just check-transported-theorem-boundary | tee artifacts/check-transported-theorem-boundary.log

      - name: Run handler contract suites
        run: |
          mkdir -p artifacts
          just check-handler-contracts | tee artifacts/check-handler-contracts.log

      - name: Run extension dispatch suites
        run: |
          mkdir -p artifacts
          just check-extension-dispatch | tee artifacts/check-extension-dispatch.log

      - name: Run semantic assurance suites
        run: |
          mkdir -p artifacts
          just check-semantic-assurance | tee artifacts/check-semantic-assurance.log

      - name: Run runtime boundary suites
        run: |
          mkdir -p artifacts
          just check-runtime-boundaries | tee artifacts/check-runtime-boundaries.log

      - name: Run Lean architecture/style checks
        run: |
          mkdir -p artifacts
          just check-arch-lean | tee artifacts/check-arch-lean.log

      - name: Run executable protocol machine placeholder baseline checks
        run: |
          mkdir -p artifacts
          just check-protocol-machine-placeholders | tee artifacts/check-protocol-machine-placeholders.log

      - name: Run parity checks
        run: |
          mkdir -p artifacts
          just check-parity | tee artifacts/check-parity.log

      - name: Run ownership contract checks
        run: |
          mkdir -p artifacts
          just check-ownership-contracts | tee artifacts/check-ownership-contracts.log

      - name: Run Aura-derived boundary checks
        run: |
          mkdir -p artifacts
          just check-aura-borrowed-lints | tee artifacts/check-aura-borrowed-lints.log

      - name: Run docs link checks
        run: |
          mkdir -p artifacts
          ./scripts/check/docs-links.sh | tee artifacts/check-docs-links.log

      - name: Run capability gate checks
        run: |
          mkdir -p artifacts
          just check-capability-gates | tee artifacts/check-capability-gates.log

      - name: Run release conformance checks
        run: |
          mkdir -p artifacts
          just check-release-conformance | tee artifacts/check-release-conformance.log

      - name: Run full Lean build
        continue-on-error: true
        run: |
          mkdir -p artifacts
          cd lean
          lake build | tee ../artifacts/lean-full-build.log

      - name: Run cross-target matrix lane
        run: |
          mkdir -p artifacts
          just verify-cross-target-matrix | tee artifacts/verify-cross-target-matrix.log

      - name: Run Track B gate
        run: |
          mkdir -p artifacts
          just verify-track-b | tee artifacts/verify-track-b.log

      - name: Run property-based lane
        run: |
          mkdir -p artifacts
          just verify-properties | tee artifacts/verify-properties.log

      - name: Run composition stress lane
        run: |
          mkdir -p artifacts
          just verify-composition-stress | tee artifacts/verify-composition-stress.log

      - name: Run V2 benchmark matrix
        run: |
          mkdir -p artifacts
          just perf-baseline run | tee artifacts/perf-baseline-run.log

      - name: Upload heavy-lane artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-heavy-lane-artifacts
          path: artifacts/
          if-no-files-found: warn
