name: Check
on: push
jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Verify Lean installation
        run: |
          lake --version
          lean --version
      - name: Provision pinned Lean dependencies
        run: |
          sudo mkdir -p /Users/hxrts/projects
          sudo chown -R "$USER":"$USER" /Users/hxrts
          ./scripts/bootstrap/dependency-checkouts.sh
      - name: Check formatting
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check
      - name: Install just
        run: cargo install just --locked
      - name: Check workflow action references
        run: just check-workflow-actions
      - name: Check verification inventory freshness
        run: just check-verification-inventory
      - name: Audit bridge normalization ledger
        run: just check-bridge-normalization
      - name: Check packaged crate artifacts
        run: just check-package-artifacts
      - name: Validate source doc DSL snippets
        run: just check-source-doc-snippets
      - name: Check Lean metrics freshness
        run: just check-lean-metrics
      - name: Run tooling convergence checks
        run: just check-tooling-convergence
      - name: Check Lean prebuilt artifacts
        run: just check-lean-prebuilt
      - name: Run strict Lean bridge verification lane
        run: just check-lean-bridge-strict
      - name: Run compiler pipeline suites
        run: just check-compiler-pipeline
      - name: Run deadlock automation suites
        run: just check-deadlock-automation
      - name: Run concrete refinement suites
        run: just check-concrete-refinement
      - name: Run extension dispatch suites
        run: just check-extension-dispatch
      - name: Run semantic assurance suites
        run: just check-semantic-assurance
      - name: Run runtime boundary suites
        run: just check-runtime-boundaries
      - name: Build sources
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --workspace --all-targets --all-features
      - name: Install native tooling
        run: sudo apt-get update && sudo apt-get install -y ripgrep gnuplot
      - name: Run executable protocol machine placeholder baseline checks
        run: ./scripts/check/protocol-machine-placeholders.sh
      - name: Run parity checks
        run: ./scripts/check/cross-runtime-parity.sh --all
      - name: Run ownership contract checks
        run: just check-ownership-contracts
      - name: Run Aura-derived boundary checks
        run: just check-aura-borrowed-lints
      - name: Check docs links
        run: ./scripts/check/docs-links.sh
      - name: Run linter
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --workspace --all-targets --all-features -- -D warnings
      - name: Run tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --workspace --all-targets --all-features

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Install just
        run: cargo install just --locked
      - name: Check WASM compilation (choreography)
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --package telltale-runtime --target wasm32-unknown-unknown --features wasm
      - name: Check WASM compilation (core)
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --package telltale --target wasm32-unknown-unknown --features wasm
      - name: Build WASM example
        run: |
          cd examples/wasm
          wasm-pack build --target web
      - name: Test WASM suites
        run: |
          just wasm-test-all

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
      - name: Install gnuplot
        run: sudo apt-get update && sudo apt-get install -y gnuplot
      - name: Build benchmark targets
        uses: actions-rs/cargo@v1
        with:
          command: bench
          args: --workspace --no-run

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build documentation
        run: nix develop --command just book
      - name: Check documentation built
        run: |
          if [ -d docs/book ]; then
            echo "Documentation built successfully"
          else
            echo "Documentation build failed"
            exit 1
          fi

  doc-links:
    name: Doc Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/config/markdown-link-check.json"
          base-branch: "main"
          folder-path: "docs"

