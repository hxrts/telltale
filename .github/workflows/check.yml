name: Check
on: push
jobs:
  cargo:
    name: Cargo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Verify Lean installation
        run: |
          lake --version
          lean --version
      - name: Provision pinned Lean dependencies
        run: |
          sudo mkdir -p /Users/hxrts/projects
          sudo chown -R "$USER":"$USER" /Users/hxrts
          ./scripts/bootstrap/dependency-checkouts.sh
      - name: Check formatting
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check
      - name: Install just
        run: cargo install just --locked
      - name: Install native tooling
        run: sudo apt-get update && sudo apt-get install -y ripgrep gnuplot
      - name: Reclaim disk before assurance lane
        run: |
          set -euo pipefail
          echo "=== Disk before assurance cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/share/swift /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          echo "=== Disk after assurance cleanup ==="
          df -h /
      - name: Run PR-critical assurance lane
        run: just check-pr-critical
      - name: Run cross-runtime parity gate
        run: ./scripts/check/cross-runtime-parity.sh --all
      - name: Build sources
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --workspace --all-targets --all-features
      - name: Run linter
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --workspace --all-targets --all-features -- -D warnings
      - name: Reclaim disk before tests
        run: |
          set -euo pipefail
          echo "=== Disk before test cleanup ==="
          df -h /
          rm -rf target/debug/incremental target/tmp .tmp || true
          free_kb="$(df --output=avail / | tail -1 | tr -d ' ')"
          min_free_kb="$((12 * 1024 * 1024))"
          if [ "$free_kb" -lt "$min_free_kb" ]; then
            echo "Free space below threshold; running cargo clean"
            cargo clean
          fi
          echo "=== Disk after test cleanup ==="
          df -h /
      - name: Run tests
        run: just test-workspace

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Install just
        run: cargo install just --locked
      - name: Check WASM compilation (choreography)
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --package telltale-runtime --target wasm32-unknown-unknown --features wasm
      - name: Check WASM compilation (core)
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --package telltale --target wasm32-unknown-unknown --features wasm
      - name: Build WASM example
        run: |
          cd examples/wasm
          wasm-pack build --target web
      - name: Test WASM suites
        run: |
          just wasm-test-all

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
      - name: Install gnuplot
        run: sudo apt-get update && sudo apt-get install -y gnuplot
      - name: Build benchmark targets
        uses: actions-rs/cargo@v1
        with:
          command: bench
          args: --workspace --no-run

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build documentation
        run: nix develop --command just book
      - name: Check documentation built
        run: |
          if [ -d docs/book ]; then
            echo "Documentation built successfully"
          else
            echo "Documentation build failed"
            exit 1
          fi

  doc-links:
    name: Doc Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/config/markdown-link-check.json"
          base-branch: "main"
          folder-path: "docs"

