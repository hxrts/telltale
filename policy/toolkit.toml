[workspace]
crate_roots = ["rust"]
include_crates = []
exclude_crates = []

[checks.unsafe_boundary]
enabled = true
include_paths = ["rust"]
exclude_path_parts = []
allowed_path_parts = []
required_comment_markers = ["Safety:"]

[checks.public_type_width]
enabled = true
include_paths = ["policy/deferred_public_type_width"]
exclude_path_parts = []
banned_types = ["usize", "isize", "f32", "f64"]

[checks.must_use_public_return]
enabled = true
include_paths = ["policy/deferred_must_use_public_return"]
exclude_path_parts = []
allowed_return_type_prefixes = []

[checks.dependency_policy]
enabled = true
manifest_roots = [".", "rust"]
require_default_features_false = []
banned_dependencies = []

[checks.docs_link_check]
enabled = true
docs_roots = ["docs"]
scratch_dir_prefix = "work/"

[checks.docs_semantic_drift]
enabled = true
docs_roots = ["policy/deferred_docs_semantic_drift"]
manifest_path = "Cargo.toml"
planned_crates = []
file_exemptions = ["CLAUDE.md", "README.md"]

[checks.docs_prose_quality]
enabled = true
include_paths = ["docs"]
exclude_path_parts = ["/book/", "SUMMARY.md"]
ban_em_dash = true
ban_semicolon = true
require_explanatory_prose_after_code = true
require_prose_exceeds_code = true

[checks.lean_style]
enabled = true
include_paths = ["policy/deferred_lean_style"]
exclude_path_parts = ["/.lake/", "/build/", "/lake-packages/", "/artifacts/"]
non_trivial_file_lines = 5
section_header_min_lines = 120
max_file_lines = 2000
max_decl_lines_target = 120
max_decl_lines_hard_limit = 240
enforce_target_decl_lines = false
require_problem_statement = false
enforce_top_of_file_structure = false
require_section_headers = false
require_over_limit_comment = true
require_explanatory_comment_for_long_blocks = false
require_public_theorem_lemma_docstrings = false
forbid_sorry = false
banned_imports = []
banned_import_exemptions = []
require_todo_for_sorry = false
todo_comment_markers = ["TODO", "todo", "TODO:"]
over_limit_comment_markers = ["long-block-exception:"]
file_exemptions = []
declaration_exemptions = []

[checks.lean_escape_hatches]
enabled = true
include_paths = ["lean"]
exclude_path_parts = ["/.lake/", "/build/", "/lake-packages/", "/artifacts/"]

[checks.lean_escape_hatches.kind_thresholds]
empty_theorem_shell = 2
implemented_by = 16
native_decide = 3
noncomputable = 10
partial_def = 3

[checks.lean_architecture]
enabled = true
include_paths = ["lean"]
exclude_path_parts = ["/.lake/", "/build/", "/lake-packages/", "/artifacts/"]
root_facade_files = [
  "lean/SessionTypes.lean",
  "lean/Choreography.lean",
  "lean/Protocol.lean",
  "lean/Runtime.lean",
]
legacy_projection_exempt_path_parts = ["/Choreography/Projection/", "/Runtime/Tests/"]
theorempack_exempt_path_parts = ["/Runtime/Proofs/Examples/", "Runtime/Proofs/TheoremPack/Artifacts.lean"]

[checks.workflow_actions]
enabled = true
workflow_roots = [".github/workflows"]
pin_comment_markers = ["pin"]

[checks.text_formatting]
enabled = true
include_paths = [
  ".github",
  ".githooks",
  "docs",
  "lean",
  "policy",
  "rust",
  "scripts",
  "AGENTS.md",
  "CLAUDE.md",
  "README.md",
  "justfile",
  "flake.nix",
  "flake.lock",
  "Cargo.toml",
  "Cargo.lock",
  "rust-toolchain.toml",
  "lean-toolchain",
]
exclude_path_parts = [
  "/.git/",
  "/.jj/",
  "/target/",
  "/node_modules/",
  "/.lake/",
  "/artifacts/",
  "/docs/book/",
]

[checks.workspace_layering]
enabled = true
manifest_path = "Cargo.toml"

[checks.workspace_layering.crate_layers]
telltale-types = 1
telltale-theory = 2
telltale-language = 2
telltale-macros = 2
telltale-machine = 3
telltale-search = 3
telltale-runtime = 4
telltale-bridge = 4
telltale-simulator = 4
telltale-transport = 4
telltale = 4
telltale-lints = 4
telltale-viewer = 5
telltale-ui = 5
telltale-web = 5

[checks.rust_architecture]
enabled = true
rust_roots = ["rust"]
determinism_runtime_paths = ["rust/machine/src", "rust/simulator/src"]
determinism_test_paths = ["rust/machine/tests", "rust/simulator/tests"]
kernel_paths = [
  "rust/machine/src/kernel.rs",
  "rust/machine/src/engine",
  "rust/machine/src/threaded",
  "rust/machine/src/scheduler",
  "rust/machine/src/session",
  "rust/machine/src/coroutine.rs",
  "rust/machine/src/exec",
]
fixed_wrapper_paths = ["rust/types/src/fixed_q32.rs"]
