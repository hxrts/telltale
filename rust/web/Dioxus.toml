[application]
name = "telltale-web"
default_platform = "web"
out_dir = "dist"
asset_dir = "public"
hot_reload = false

[web.app]
title = "Telltale"

[web.watcher]
index_on_404 = true
reload_html = false
watch_path = ["src", "../ui/src", "styles", "public"]

[web.resource]
style = ["./assets/tailwind.css"]
script = []

[web.resource.dev]
script = []

[web.wasm_opt]
level = "0"
